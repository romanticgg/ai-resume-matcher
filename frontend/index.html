<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f4f6f9;
            color: #333;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .lang-btn {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #e5e7eb;
            color: #111827;
            margin-left: 8px;
        }
        .lang-btn:active {
            background: #111827;
            color: white;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
        }
        button:hover {
            background: #1d4ed8;
        }
        .result {
            margin-top: 24px;
        }
        .job-card {
            background: white;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .job-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #1d4ed8;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            margin: 4px 6px 4px 0;
            border-radius: 999px;
            font-size: 13px;
            background: #e5e7eb;
        }
        .matched {
            background: #dcfce7;
            color: #166534;
        }
        .missing {
            background: #fee2e2;
            color: #991b1b;
        }
        .suggestion {
            margin-top: 10px;
            padding: 10px;
            border-left: 4px solid #2563eb;
            background: #eff6ff;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="lang-btn active" onclick="setLanguage('zh')" id="btnZh">中文</button>
        <button class="lang-btn" onclick="setLanguage('en')" id="btnEn">English</button>
    </div>

    <h1 id="title">AI简历分析与岗位匹配系统</h1>

    <textarea id="resumeText" placeholder="请粘贴你的简历内容，例如：熟悉Python、SQL、数据分析、Flask开发..."></textarea>
    <br>
    <button onclick="matchResume()" id="matchBtn">开始匹配岗位</button>

    <div id="results" class="result" style="display:none;"></div>

    <script>
        let currentLang = "zh";
        let lastResults = [];

        const translations = {
            zh: {
                title: "AI简历分析与岗位匹配系统",
                placeholder: "请粘贴你的简历内容，例如：熟悉Python、SQL、数据分析、Flask开发...",
                matchBtn: "开始匹配岗位",
                resultTitle: "岗位匹配结果",
                score: "匹配分数",
                percentage: "匹配度",
                matched: "已匹配技能",
                missing: "缺失技能",
                suggestion: "建议",
                error: "发生错误，请检查输入内容。",
                none: "无",
                toggle: "English",
                suggestions: {
                    strong: "匹配度较高，你的技能与该岗位需求较为吻合。",
                    moderate: "匹配度中等，建议补充缺失技能以提升竞争力。",
                    low: "匹配度较低，建议优先学习该岗位所需的核心技能。"
                }
            },
            en: {
                title: "AI Resume Analysis and Job Matching System",
                placeholder: "Paste your resume text here, e.g. Python, SQL, data analysis, Flask development...",
                matchBtn: "Match Jobs",
                resultTitle: "Job Matching Results",
                score: "Score",
                percentage: "Match Percentage",
                matched: "Matched Skills",
                missing: "Missing Skills",
                suggestion: "Suggestion",
                error: "An error occurred. Please check your input.",
                none: "None",
                toggle: "中文",
                suggestions: {
                    strong: "Strong match. Your skills align well with this role.",
                    moderate: "Moderate match. You can improve by learning the missing skills.",
                    low: "Low match. You need more core skills for this role."
                }
            }
        };

        function updateLanguageUI() {
            const t = translations[currentLang];
            document.getElementById("title").innerText = t.title;
            document.getElementById("resumeText").placeholder = t.placeholder;
            document.getElementById("matchBtn").innerText = t.matchBtn;


            if (lastResults.length > 0) {
                renderResults(lastResults);
            }
            updateLanguageUI();//保证页面加载时自动应用中文
        }

        function setLanguage(lang) {
            currentLang = lang;

            // 更新按钮状态
            // document.getElementById("btnZh").classList.remove("active");
            // document.getElementById("btnEn").classList.remove("active");

            if (lang === "zh") {
                document.getElementById("btnZh").classList.add("active");
            } else {
                document.getElementById("btnEn").classList.add("active");
            }

            updateLanguageUI();
        }

        function renderResults(results) {
            const t = translations[currentLang];
            const resultsDiv = document.getElementById("results");

            let html = `<h2>${t.resultTitle}</h2>`;

            results.forEach(item => {
                const matchedSkills = item.matched_skills.length
                    ? item.matched_skills.map(skill => `<span class="tag matched">${skill}</span>`).join("")
                    : t.none;

                const missingSkills = item.missing_skills.length
                    ? item.missing_skills.map(skill => `<span class="tag missing">${skill}</span>`).join("")
                    : t.none;

                const suggestionText = t.suggestions[item.suggestion_key] || "";

                html += `
                    <div class="job-card">
                        <h3>${item.job}</h3>
                        <p><strong>${t.score}：</strong> ${item.score}</p>
                        <p><strong>${t.percentage}：</strong> ${item.match_percentage}%</p>
                        <p><strong>${t.matched}：</strong><br>${matchedSkills}</p>
                        <p><strong>${t.missing}：</strong><br>${missingSkills}</p>
                        <div class="suggestion"><strong>${t.suggestion}：</strong> ${suggestionText}</div>
                    </div>
                `;

            });

            resultsDiv.innerHTML = html;
            resultsDiv.style.display = "block";
        }

        async function matchResume() {
            const resumeText = document.getElementById("resumeText").value;
            const resultsDiv = document.getElementById("results");
            const t = translations[currentLang];

            try {
                const response = await fetch("/match", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ resume_text: resumeText })
                });

                const data = await response.json();

                if (data.success) {
                    lastResults = data.results;
                    renderResults(lastResults);
                } else {
                    resultsDiv.innerHTML = `<p>${t.error}</p>`;
                    resultsDiv.style.display = "block";
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p>${t.error}</p>`;
                resultsDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
